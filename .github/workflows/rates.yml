name: Update rates

on:
  schedule:
    # ~17:40 ET on weekdays (after Treasury posts the daily curve). Cron is UTC.
    - cron: "40 22 * * 1-5"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  rates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build rates.json
        run: python3 .github/scripts/build_rates.py

      - name: Commit if changed
        run: |
          git config user.name  "rates-bot"
          git config user.email "actions@users.noreply.github.com"
          git add rates.json
          git diff --cached --quiet || git commit -m "rates $(date -u +%F)"
          git push
